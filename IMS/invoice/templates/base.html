{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Traffix{% endblock title %}</title>

    {% comment %} CSS {% endcomment %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    {% comment %} Icons {% endcomment %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="{% static "css/style.css" %}">
</head>
<body>
<div class="sidebar">
    <a class="navbar-brand fw-bold d-block mb-3" href="{% url 'dashboard-view' %}">
        <i class="fa-solid fa-building-columns"></i> PayNest
    </a>
  <nav class="nav flex-column">
    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard-view' %}active{% endif %}" href="{% url 'dashboard-view' %}">
      <i class="fa-solid fa-chart-line"></i> Dashboard
    </a>

    <a class="nav-link {% if request.resolver_match.url_name == 'invoice-view' %}active{% endif %}" href="{% url 'invoice-view' %}">
      <i class="fa-solid fa-file-lines"></i> Invoices
    </a>

    <a class="nav-link {% if request.resolver_match.url_name == 'clients-view' %}active{% endif %}" href="{% url 'clients-view' %}">
      <i class="fa-solid fa-users"></i> Clients
    </a>


    <a class="nav-link {% if request.resolver_match.url_name == 'profile-view' %}active{% endif %}" href="{% url 'profile-view' %}">
      <i class="fa-solid fa-user"></i> Profile
    </a>
  </nav>
</div>
    <main class="container"  style="margin-top:20px;  margin-left: 240px; padding: 20px;">
        {% block content %}{% endblock content %}
    </main>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
